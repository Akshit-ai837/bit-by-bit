<div class="tabs-wrap">
  <div class="tabs">
    <button class="tab active" onclick="switchTab('nlp')">
      <span class="tab-num">01</span>
      NLP Analyzer
    </button>
    <button class="tab" onclick="switchTab('escrow')">
      <span class="tab-num">02</span>
      Escrow Vault
    </button>
    <button class="tab" onclick="switchTab('aqa')">
      <span class="tab-num">03</span>
      Quality Check
    </button>
    <button class="tab" onclick="switchTab('pfi')">
      <span class="tab-num">04</span>
      PFI Score
    </button>
  </div>
</div>

<style>
.tabs-wrap{
  background:var(--bg);
  border-bottom:0.5px solid var(--border);
  padding:0 1.5rem;
  position:sticky;
  top:57px;
  z-index:90;
}
.tabs{
  display:flex;
  gap:0;
  max-width:960px;
  margin:0 auto;
}
.tab{
  display:flex;
  align-items:center;
  gap:8px;
  padding:14px 20px;
  font-size:13px;
  font-weight:500;
  cursor:pointer;
  border:none;
  background:none;
  color:var(--text2);
  border-bottom:2px solid transparent;
  font-family:'DM Sans',sans-serif;
  transition:all 0.15s;
  white-space:nowrap;
}
.tab:hover:not(.active){color:var(--text);background:var(--bg2)}
.tab.active{color:var(--green);border-bottom:2px solid var(--green)}
.tab-num{
  font-size:10px;
  font-weight:700;
  color:var(--text3);
  letter-spacing:0.5px;
}
.tab.active .tab-num{color:var(--green-mid)}

@media(max-width:600px){
  .tabs-wrap{padding:0 0.5rem;top:53px}
  .tab{padding:12px 12px;font-size:12px}
  .tab-num{display:none}
}
</style>
